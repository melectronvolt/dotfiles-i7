# Désactive NVIDIA pour EGL et Vulkan dans ma session user.
#
# Raison : SwayFX/wlroots charge libEGL_nvidia par défaut (libglvnd énumère
# tous les vendor JSON), ouvre des fd sur /dev/nvidia0. Quand libvirt unbind
# le driver nvidia pour passer la RTX 4080 en VFIO au premier `virsh start`
# post-reboot, wlroots perd son contexte EGL NVIDIA et le compositor crashe
# (signature : boucle d'atomic commit failed sur HDMI-A-1 pendant ~48s puis
# session Sway tuée).
#
# GNOME/Mutter ne rencontre pas ce bug car il sélectionne explicitement son
# primary render device plutôt que de probe tous les vendors disponibles.
#
# CUDA n'est pas impacté : libcuda + /dev/nvidia0 + nvidia_uvm fonctionnent
# indépendamment de libEGL_nvidia et du Vulkan ICD NVIDIA. nvidia-smi et
# tous les workloads CUDA restent opérationnels.
#
# Override ponctuel si besoin de NVIDIA EGL/Vulkan pour un usage spécifique :
#   env -u __EGL_VENDOR_LIBRARY_FILENAMES -u VK_DRIVER_FILES <commande>

__EGL_VENDOR_LIBRARY_FILENAMES=/usr/share/glvnd/egl_vendor.d/50_mesa.json
VK_DRIVER_FILES=/usr/share/vulkan/icd.d/intel_icd.x86_64.json
